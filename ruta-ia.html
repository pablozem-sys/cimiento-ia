<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruta IA · Cimiento IA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1A1C20; color: #f0ede8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; }
    body::before { content: ''; position: fixed; left: 0; top: 0; width: 14px; height: 100%; background: #D2232A; z-index: 100; }
    header { background: #22252b; border-bottom: 1px solid rgba(255,255,255,0.08); padding: 20px 40px 20px 36px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 50; }
    .header-logo { display: flex; align-items: center; gap: 10px; }
    .logo-dot { width: 11px; height: 11px; border-radius: 50%; background: #D2232A; }
    .logo-name { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
    .logo-name span { color: #16C5D6; }
    nav { margin-left: auto; display: flex; gap: 4px; }
    nav a { text-decoration: none; font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: 6px; color: #8a8580; transition: all 0.2s; }
    nav a:hover { color: #f0ede8; background: rgba(255,255,255,0.07); }
    nav a.active { color: #16C5D6; background: rgba(22,197,214,0.12); }
    main { max-width: 860px; margin: 0 auto; padding: 44px 28px 80px; }
    .page-label { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: #16C5D6; margin-bottom: 10px; }
    .page-title { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; }
    .page-sub { color: #8a8580; font-size: 14px; margin-bottom: 40px; max-width: 480px; }
    .ruta-visual { display: flex; align-items: center; margin-bottom: 40px; padding: 18px 20px; background: #22252b; border-radius: 12px; border: 1px solid rgba(255,255,255,0.07); }
    .nodo { display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 80px; }
    .nodo-circulo { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; transition: all 0.3s; }
    .nodo-circulo.activo { background: #2BA86F; color: #fff; }
    .nodo-circulo.pendiente { background: #333; color: #8a8580; border: 2px solid #444; }
    .nodo-label { font-size: 11px; color: #8a8580; text-align: center; max-width: 70px; }
    .linea-ruta { flex: 1; height: 2px; background: rgba(22,197,214,0.2); margin-bottom: 22px; }
    .progreso-resumen { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; padding: 14px 18px; background: #22252b; border-radius: 10px; border: 1px solid rgba(255,255,255,0.07); }
    .progreso-texto { font-size: 13px; color: #8a8580; }
    .progreso-texto strong { color: #f0ede8; }
    .progreso-pct { font-size: 22px; font-weight: 800; color: #E0982A; }
    .progreso-global-bar { height: 6px; background: rgba(255,255,255,0.07); border-radius: 3px; margin-top: 8px; overflow: hidden; }
    .progreso-global-fill { height: 100%; background: linear-gradient(90deg, #2BA86F, #16C5D6); border-radius: 3px; transition: width 0.6s ease; }
    .modulo { background: #22252b; border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; overflow: hidden; margin-bottom: 16px; transition: border-color 0.2s; }
    .modulo:hover { border-color: rgba(255,255,255,0.14); }
    .modulo-header { padding: 20px 22px; display: flex; align-items: center; gap: 16px; cursor: pointer; user-select: none; }
    .modulo-num { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: #8a8580; min-width: 28px; }
    .modulo-icono { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .modulo-icono.intro { background: rgba(22,197,214,0.12); }
    .modulo-icono.prompt { background: rgba(43,168,111,0.12); }
    .modulo-icono.avanzado { background: rgba(224,152,42,0.12); }
    .modulo-info { flex: 1; }
    .modulo-titulo { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
    .modulo-meta { font-size: 12px; color: #8a8580; display: flex; gap: 12px; }
    .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-activo { background: rgba(43,168,111,0.15); color: #2BA86F; }
    .badge-pronto { background: rgba(255,255,255,0.07); color: #8a8580; }
    .chevron { color: #8a8580; font-size: 18px; transition: transform 0.3s ease; }
    .modulo.abierto .chevron { transform: rotate(90deg); }
    .progreso-bar { height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .progreso-fill { height: 100%; background: #2BA86F; border-radius: 2px; transition: width 0.5s ease; }
    .lecciones { display: none; border-top: 1px solid rgba(255,255,255,0.07); }
    .modulo.abierto .lecciones { display: block; }
    .leccion-item { padding: 0 22px 0 84px; }
    .leccion-trigger { display: flex; align-items: center; gap: 12px; padding: 13px 0; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: all 0.2s; }
    .leccion-item:last-child .leccion-trigger { border-bottom: none; }
    .leccion-trigger:hover .leccion-nombre { color: #16C5D6; }
    .leccion-punto { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #444; background: transparent; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; transition: all 0.3s; }
    .leccion-item.activa .leccion-punto { border-color: #16C5D6; box-shadow: 0 0 8px rgba(22,197,214,0.4); }
    .leccion-item.completada .leccion-punto { background: #2BA86F; border-color: #2BA86F; color: #fff; }
    .leccion-nombre { font-size: 14px; font-weight: 500; flex: 1; transition: color 0.2s; }
    .leccion-item.completada .leccion-nombre { color: #8a8580; text-decoration: line-through; text-decoration-color: rgba(138,133,128,0.4); }
    .leccion-tags { display: flex; align-items: center; gap: 8px; }
